name: Export Draw.io to PNG

on:
  push:
    paths:
      - 'diagrams/**/*.drawio'

permissions:
  contents: write

jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y xvfb wget libgbm1 libasound2t64

      - name: Install draw.io CLI (AppImage)
        run: |
          DOWNLOAD_URL=$(curl -s https://api.github.com/repos/jgraph/drawio-desktop/releases/tags/v21.8.6 \
            | grep "browser_download_url" \
            | grep "AppImage" \
            | grep "x86_64" \
            | head -1 \
            | cut -d '"' -f 4)
          echo "Downloading: $DOWNLOAD_URL"
          wget -q "$DOWNLOAD_URL" -O drawio.AppImage
          chmod +x drawio.AppImage
          ./drawio.AppImage --appimage-extract
          chmod +x squashfs-root/draw.io

      - name: Export Draw.io diagrams
        run: |
          mkdir -p diagrams/retrospective/png
          for f in diagrams/retrospective/drawio/*.drawio; do
            xvfb-run --auto-servernum squashfs-root/draw.io \
              --no-sandbox \
              --export \
              --format png \
              --output "diagrams/retrospective/png/$(basename "$f" .drawio).png" \
              "$f"
          done

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add diagrams/retrospective/png/
          git diff --staged --quiet || git commit -m "chore: update PNGs from draw.io" && git push